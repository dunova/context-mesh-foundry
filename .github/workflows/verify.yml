name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # 1. Lint — fast gate, runs first; all test jobs depend on it
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Cache pip (lint)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install lint tools
        run: pip install --quiet "ruff==0.15.7" "bandit==1.8.3"

      - name: Check Bash syntax
        run: bash -n scripts/*.sh

      - name: Check Python syntax
        run: python -m py_compile src/contextgo/*.py tests/*.py scripts/*.py benchmarks/*.py

      - name: Ruff lint
        run: ruff check src/contextgo/ tests/ scripts/ benchmarks/

      - name: Ruff format check
        run: ruff format --check src/contextgo/ tests/ scripts/ benchmarks/

      - name: Bandit security scan
        run: bandit -r src/contextgo/ -c pyproject.toml --quiet

      - name: Safety dependency check
        run: |
          pip install --quiet safety
          if command -v safety >/dev/null 2>&1; then
            safety check --stdin < requirements.txt
          else
            echo "ERROR: safety command not found after install" && exit 1
          fi

      - name: Secret and path scan
        run: |
          sudo apt-get install -y --no-install-recommends ripgrep
          # Block common secret patterns (exclude test files and known-safe paths)
          ! rg -n \
            "AIza[0-9A-Za-z_-]{20,}|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}" \
            --glob '!artifacts/' \
            --glob '!.github/' \
            --glob '!scripts/test_*.py' \
            --glob '!tests/test_*.py' \
            . || (echo "ERROR: secret pattern detected" && exit 1)
          # Block hardcoded home paths
          ! rg -n "/Users/\\w+/" \
            --glob '!artifacts/' \
            --glob '!.github/' \
            --glob '!native/session_scan_go/*_test.go' \
            --glob '!tests/test_*.py' \
            --glob '!CONTRIBUTING.md' \
            . || (echo "ERROR: hardcoded path detected" && exit 1)

  # -------------------------------------------------------------------------
  # 2. Python tests — matrix across 3.10 / 3.11 / 3.12
  # -------------------------------------------------------------------------
  python-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip (test)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest \
            tests \
            --cov=src/contextgo \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=97 \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Benchmark smoke (sanity)
        run: python -m benchmarks --iterations 1 --warmup 0 --query benchmark

  # -------------------------------------------------------------------------
  # 3. Go tests
  # -------------------------------------------------------------------------
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5
        with:
          go-version: "1.22"
          cache-dependency-path: native/session_scan_go/go.mod

      - name: go vet
        working-directory: native/session_scan_go
        run: go vet ./...

      - name: go test
        working-directory: native/session_scan_go
        run: go test -race ./...

  # -------------------------------------------------------------------------
  # 4. Rust check and test
  # -------------------------------------------------------------------------
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/contextgo_target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/session_scan/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo clippy
        run: |
          cd native/session_scan
          CARGO_TARGET_DIR=/tmp/contextgo_target cargo clippy -- -D warnings

      - name: cargo test
        run: |
          cd native/session_scan
          CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=/tmp/contextgo_target cargo test

  # -------------------------------------------------------------------------
  # 5. Quality gate — depends on all language tests passing
  # -------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - python-test
      - go-test
      - rust-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Cache pip (quality)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-quality-3.11-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-quality-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: End-to-end quality gate
        run: python scripts/e2e_quality_gate.py

      - name: Smoke gate (sandboxed)
        run: python scripts/context_cli.py smoke
