name: Verify

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # 1. Lint — fast gate, runs first; all test jobs depend on it
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip (lint)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install --quiet "ruff>=0.4"

      - name: Check Bash syntax
        run: bash -n scripts/*.sh

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py benchmarks/*.py

      - name: Ruff lint
        run: ruff check scripts/ benchmarks/

      - name: Ruff format check
        run: ruff format --check scripts/ benchmarks/

      - name: Secret and path scan
        run: |
          pip install --quiet ripgrep || sudo apt-get install -y ripgrep
          # Block common secret patterns (exclude test files and known-safe paths)
          ! rg -n \
            "AIza[0-9A-Za-z_-]{20,}|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}" \
            --glob '!artifacts/' \
            --glob '!.github/' \
            --glob '!scripts/test_*.py' \
            . || (echo "ERROR: secret pattern detected" && exit 1)
          # Block hardcoded home paths
          ! rg -n "/Users/\\w+/" \
            --glob '!artifacts/' \
            --glob '!.github/' \
            --glob '!native/session_scan_go/*_test.go' \
            --glob '!CONTRIBUTING.md' \
            . || (echo "ERROR: hardcoded path detected" && exit 1)

  # -------------------------------------------------------------------------
  # 2. Python tests — matrix across 3.10 / 3.11 / 3.12
  # -------------------------------------------------------------------------
  python-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip (test)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest \
            scripts/test_context_cli.py \
            scripts/test_context_core.py \
            scripts/test_context_native.py \
            scripts/test_context_smoke.py \
            scripts/test_session_index.py \
            scripts/test_autoresearch_contextgo.py \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Benchmark smoke (sanity)
        run: python -m benchmarks --iterations 1 --warmup 0 --query benchmark

  # -------------------------------------------------------------------------
  # 3. Go tests
  # -------------------------------------------------------------------------
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: native/session_scan_go/go.mod

      - name: go vet
        working-directory: native/session_scan_go
        run: go vet ./...

      - name: go test
        working-directory: native/session_scan_go
        run: go test -race ./...

  # -------------------------------------------------------------------------
  # 4. Rust check and test
  # -------------------------------------------------------------------------
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/contextgo_target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/session_scan/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo clippy
        run: |
          cd native/session_scan
          CARGO_TARGET_DIR=/tmp/contextgo_target cargo clippy -- -D warnings

      - name: cargo test
        run: |
          cd native/session_scan
          CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=/tmp/contextgo_target cargo test

  # -------------------------------------------------------------------------
  # 5. Quality gate — depends on all language tests passing
  # -------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - python-test
      - go-test
      - rust-check
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip (quality)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-quality-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-quality-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: End-to-end quality gate
        run: python scripts/e2e_quality_gate.py

      - name: Smoke gate (sandboxed)
        run: python scripts/context_cli.py smoke
