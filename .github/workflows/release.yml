name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Release pipeline
#
# Trigger: push a semver tag (e.g. v0.9.0).
# Steps:
#   1. Validate tag matches VERSION file.
#   2. Create GitHub Release (body from CHANGELOG or auto-generated).
#   3. Keep release creation stable without assuming PyPI publishing is configured.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # 1. Pre-release validation
  # -------------------------------------------------------------------------
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.tag.outputs.version }}
      has_notes: ${{ steps.notes.outputs.has_notes }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Parse tag version
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Confirm VERSION file matches tag
        run: |
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "OK: VERSION=$FILE_VERSION"

      - name: Confirm pyproject.toml classifiers include this Python version range
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Verify pyproject.toml has correct version in classifiers (3.10-3.13)
          if ! grep -q "Programming Language :: Python :: 3.10" pyproject.toml; then
            echo "WARNING: pyproject.toml missing Python 3.10 classifier"
          fi
          # Verify hatch version path still points to VERSION file
          if ! grep -q 'path = "VERSION"' pyproject.toml; then
            echo "ERROR: pyproject.toml hatch version path misconfigured"
            exit 1
          fi
          echo "OK: pyproject.toml version config validated"

      - name: Confirm CHANGELOG mentions this version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ -f "CHANGELOG.md" ]; then
            if ! grep -q "$TAG_VERSION" CHANGELOG.md; then
              echo "WARNING: CHANGELOG.md does not mention version $TAG_VERSION"
            else
              echo "OK: CHANGELOG.md contains $TAG_VERSION"
            fi
          else
            echo "INFO: No CHANGELOG.md found, skipping check"
          fi

      - name: Check for release notes file
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="docs/RELEASE_NOTES_${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "Using $NOTES_FILE as release body"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "No dedicated release notes file found; using auto-generated notes"
          fi

  # -------------------------------------------------------------------------
  # 2. Test gate — ensure tests pass before publishing
  # -------------------------------------------------------------------------
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run core tests
        run: |
          python -m pytest tests \
            --cov=src/contextgo \
            --cov-report=term-missing \
            --cov-fail-under=97 \
            -v

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5
        with:
          go-version: "1.22"
          cache-dependency-path: native/session_scan_go/go.mod

      - name: Go vet
        working-directory: native/session_scan_go
        run: go vet ./...

      - name: Go test
        working-directory: native/session_scan_go
        run: go test -race ./...

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/contextgo_target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/session_scan/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo clippy
        run: |
          cd native/session_scan
          CARGO_TARGET_DIR=/tmp/contextgo_target cargo clippy -- -D warnings

      - name: Cargo test
        run: |
          cd native/session_scan
          CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=/tmp/contextgo_target cargo test

  # -------------------------------------------------------------------------
  # 3. Create GitHub Release
  # -------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0

      - name: Create GitHub release (with release notes)
        if: needs.validate.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2
        with:
          body_path: docs/RELEASE_NOTES_${{ needs.validate.outputs.version }}.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: "true"

      - name: Create GitHub release (auto-generated notes)
        if: needs.validate.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: "true"

  # -------------------------------------------------------------------------
  # 4. Publish to PyPI (trusted publisher — no API token needed)
  # -------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/contextgo
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build twine

      - name: Build sdist and wheel
        run: python3 -m build

      - name: Check dist artifacts
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          skip-existing: true
