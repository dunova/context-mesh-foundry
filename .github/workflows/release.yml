name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Release pipeline
#
# Trigger: push a semver tag (e.g. v0.9.0).
# Steps:
#   1. Validate tag matches VERSION file.
#   2. Create GitHub Release (body from CHANGELOG or auto-generated).
#   3. Keep release creation stable without assuming PyPI publishing is configured.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # 1. Pre-release validation
  # -------------------------------------------------------------------------
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.tag.outputs.version }}
      has_notes: ${{ steps.notes.outputs.has_notes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Parse tag version
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Confirm VERSION file matches tag
        run: |
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "OK: VERSION=$FILE_VERSION"

      - name: Check for release notes file
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="docs/RELEASE_NOTES_${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "Using $NOTES_FILE as release body"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "No dedicated release notes file found; using auto-generated notes"
          fi

  # -------------------------------------------------------------------------
  # 2. Test gate — ensure tests pass before publishing
  # -------------------------------------------------------------------------
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run core tests
        run: |
          python -m pytest tests \
            --cov=src/contextgo \
            --cov-report=term-missing \
            --cov-fail-under=97 \
            -v

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5
        with:
          go-version: "1.22"
          cache-dependency-path: native/session_scan_go/go.mod

      - name: Go vet
        working-directory: native/session_scan_go
        run: go vet ./...

      - name: Go test
        working-directory: native/session_scan_go
        run: go test -race ./...

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/contextgo_target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/session_scan/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo clippy
        run: |
          cd native/session_scan
          CARGO_TARGET_DIR=/tmp/contextgo_target cargo clippy -- -D warnings

      - name: Cargo test
        run: |
          cd native/session_scan
          CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=/tmp/contextgo_target cargo test

  # -------------------------------------------------------------------------
  # 3. Create GitHub Release
  # -------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          fetch-depth: 0

      - name: Create GitHub release (with release notes)
        if: needs.validate.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          body_path: docs/RELEASE_NOTES_${{ needs.validate.outputs.version }}.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: "true"

      - name: Create GitHub release (auto-generated notes)
        if: needs.validate.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: "true"

  # -------------------------------------------------------------------------
  # 4. Publish to PyPI (trusted publisher — no API token needed)
  # -------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/contextgo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build twine

      - name: Build sdist and wheel
        run: python3 -m build

      - name: Check dist artifacts
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          skip-existing: true
