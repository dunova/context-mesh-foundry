name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Release pipeline
#
# Trigger: push a semver tag (e.g. v0.9.0).
# Steps:
#   1. Validate tag matches VERSION file.
#   2. Create GitHub Release (body from CHANGELOG or auto-generated).
#   3. Keep release creation stable without assuming PyPI publishing is configured.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # 1. Pre-release validation
  # -------------------------------------------------------------------------
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Parse tag version
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Confirm VERSION file matches tag
        run: |
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "OK: VERSION=$FILE_VERSION"

  # -------------------------------------------------------------------------
  # 2. Create GitHub Release
  # -------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Locate release notes
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          NOTES_FILE="docs/RELEASE_NOTES_${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "body_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "Using $NOTES_FILE as release body"
          else
            echo "No dedicated release notes file found; using auto-generated notes"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: "true"
