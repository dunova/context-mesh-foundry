name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 07:00 UTC (after dependabot PRs)
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python, go]
        # Rust is not yet supported by CodeQL; covered by cargo clippy in verify.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Python: use default auto-build
          # Go: point at the Go module directory
          config: |
            paths:
              - src/contextgo
              - native/session_scan_go
            paths-ignore:
              - tests
              - benchmarks
              - artifacts
              - patches

      - name: Set up Python (for Python analysis)
        if: matrix.language == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install Python package (for Python analysis)
        if: matrix.language == 'python'
        run: pip install --quiet -e .

      - name: Set up Go (for Go analysis)
        if: matrix.language == 'go'
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5
        with:
          go-version: "1.22"
          cache-dependency-path: native/session_scan_go/go.mod

      - name: Autobuild
        uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
