name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 07:00 UTC (after dependabot PRs)
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && 'schedule' || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python, go]
        # Rust is not yet supported by CodeQL; covered by cargo clippy in verify.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Python: use default auto-build
          # Go: point at the Go module directory
          config: |
            paths:
              - src/contextgo
              - native/session_scan_go
            paths-ignore:
              - tests
              - benchmarks
              - artifacts
              - patches

      - name: Set up Python (for Python analysis)
        if: matrix.language == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Python package (for Python analysis)
        if: matrix.language == 'python'
        run: pip install --quiet -e .

      - name: Set up Go (for Go analysis)
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5
        with:
          go-version: "1.22"
          cache-dependency-path: native/session_scan_go/go.mod

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13  # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
