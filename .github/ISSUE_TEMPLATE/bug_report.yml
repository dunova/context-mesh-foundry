name: Bug Report
description: Report a reproducible defect in ContextGO
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below as completely as possible so we can reproduce and fix the issue quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the bug.
      placeholder: Briefly describe what is broken and how it affects you.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps that reliably trigger the bug.
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens. Include full error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant version information.
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04 / Windows 11
        - Python: 3.11.x
        - Go: 1.25.x
        - Rust: stable x.y.z
        - ContextGO version / commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Additional Context
      description: Paste any relevant log output, screenshots, or additional context here.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reproduced this issue on the latest commit of the default branch.
          required: true
