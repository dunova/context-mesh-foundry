[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "contextgo"
dynamic = ["version"]
description = "Local-first context & memory runtime for multi-agent AI coding teams"
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.10"
authors = [{name = "Dunova"}]
keywords = ["ai", "context", "memory", "local-first", "developer-tools", "multi-agent"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = []  # httpx is optional, loaded lazily

[project.optional-dependencies]
remote = ["httpx>=0.27"]
dev = ["pytest>=8.0", "ruff>=0.4", "bandit>=1.8"]

[project.scripts]
contextgo = "scripts.context_cli:main"

[project.urls]
Homepage = "https://github.com/dunova/ContextGO"
Documentation = "https://github.com/dunova/ContextGO/tree/main/docs"
Repository = "https://github.com/dunova/ContextGO"
Issues = "https://github.com/dunova/ContextGO/issues"

[tool.hatch.version]
path = "VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["scripts"]
python_files = ["test_*.py"]
addopts = "--cov=scripts --cov-report=term-missing --cov-report=xml"

[tool.coverage.run]
source = ["scripts"]
omit = ["scripts/test_*.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
