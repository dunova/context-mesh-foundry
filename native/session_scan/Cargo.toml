[package]
name = "session_scan"
version = "0.1.0"
edition = "2021"
description = "High-performance prototype that scans Codex/Claude sessions."
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive" ] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shellexpand = "2"
walkdir = "2"
